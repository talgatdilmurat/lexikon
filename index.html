<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Lexikon</title>
  <meta name="description" content="A calm, personal vocabulary app for learning authentic everyday English.">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2F5043">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Lexikon">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <header class="appbar">
      <h1 id="screen-title">Study</h1>
      <div class="meta" id="screen-meta"></div>
    </header>
    <main class="view" id="view"></main>
    <nav class="floatbar glassbase" id="nav" aria-label="Primary"></nav>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <noscript style="display:block;padding:40px;text-align:center;font-family:Georgia,serif">Lexikon needs JavaScript to run.</noscript>
  <script type="module" src="js/app.js"></script>
</body>
</html>
